name: Main CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_ENV: test
  SKIP_ENV_VALIDATION: "true"
  NEXT_PUBLIC_DISABLE_DEVTOOLS: "true"
  NEXT_PUBLIC_WEBSITE_URL: "http://localhost:3000"
  BETTER_AUTH_URL: "http://localhost:3000"
  REDIS_URL: "redis://localhost:6379"

jobs:
  build:
    name: Bun CI
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup project
        uses: ./.github/actions/setup-project

      - name: Typegen
        run: bun run typegen

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Tests
        run: bun run test:unit

      - name: Build
        run: bun run build
