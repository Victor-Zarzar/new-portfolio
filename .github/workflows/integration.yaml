name: Integration Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_ENV: test
  SKIP_ENV_VALIDATION: "true"
  NEXT_PUBLIC_DISABLE_DEVTOOLS: "true"
  NEXT_PUBLIC_WEBSITE_URL: "http://localhost:3000"
  SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
  SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
  SMTP_HOST: ${{ secrets.SMTP_HOST }}
  SMTP_PORT: ${{ secrets.SMTP_PORT }}
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
  SENTRY_RELEASE: ${{ secrets.SENTRY_RELEASE }}
  SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
  SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
  POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
  BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
  BETTER_AUTH_URL: "http://localhost:3000"
  ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
  GH_USERNAME: ${{ secrets.GH_USERNAME }}
  GH_API_TOKEN: ${{ secrets.GH_API_TOKEN }}
  GOOGLE_RECAPTCHA_SECRET_KEY: ${{ secrets.GOOGLE_RECAPTCHA_SECRET_KEY }}
  NEXT_PUBLIC_GOOGLE_RECAPTCHA_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_RECAPTCHA_PUBLIC_KEY }}
  REDIS_URL: "redis://localhost:6379"

jobs:
  run-integration-tests:
    name: Run Integration Tests
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup project
        uses: ./.github/actions/setup-project

      - name: Test
        run: bun run test:integration
